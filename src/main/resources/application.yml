spring:
  application:
    name: cache-fallback
  datasource:
    url: jdbc:mysql://localhost:3307/cachefallback
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: cachefallback
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  data:
    redis:
      host: localhost
      port: 6379

resilience4j:
  circuitbreaker:
    instances:
      redisCache:
        sliding-window-size: 10
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 2
