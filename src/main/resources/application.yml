spring:
  application:
    name: cache-fallback
  datasource:
    url: jdbc:h2:mem:cachefallback
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  data:
    redis:
      host: localhost
      port: 6379
  h2:
    console:
      enabled: true

resilience4j:
  circuitbreaker:
    instances:
      redisCache:
        sliding-window-size: 10
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 2
